[defaults]
inventory                = ansible/inventory/lab
roles_path               = ansible/roles
collections_path         = ansible/collections:~/.ansible/collections
host_key_checking        = False
retry_files_enabled      = False
stdout_callback          = ansible.builtin.default
result_format            = yaml
callbacks_enabled        = profile_tasks, timer
forks                    = 25
gathering                = smart
fact_caching             = jsonfile
fact_caching_connection  = .cache/facts
fact_caching_timeout     = 7200
interpreter_python       = auto_silent

[persistent_connection]
connect_timeout          = 60
command_timeout          = 120

[inventory]
enable_plugins           = netbox.netbox.nb_inventory, yaml, ini, auto

[ssh_connection]
pipelining               = True
ssh_args                 = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey,password
