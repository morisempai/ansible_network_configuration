---
- name: Converge
  hosts: all
  gather_facts: true
  pre_tasks:
    # update_cache is required: the test image ships with an empty apt cache.
    - name: "Refresh apt cache and ensure openssh-server is present"
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true
  tasks:
    - name: "Apply the linux_base role"
      ansible.builtin.include_role:
        name: linux_base
