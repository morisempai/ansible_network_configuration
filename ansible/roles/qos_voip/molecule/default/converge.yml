---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Drives tasks/assert.yml (schema validation). On a plain Linux host with
    # no ansible_network_os the role validates the inputs, then resolves to a
    # no-op — there is no device path. These values mirror the architecture
    # brief: the VoIP VLAN is 60, marked Expedited Forwarding.
    qos_voip_vlan_id: 60
    qos_voip_marking: ef
  tasks:
    - name: "Apply the qos_voip role"
      ansible.builtin.include_role:
        name: qos_voip
