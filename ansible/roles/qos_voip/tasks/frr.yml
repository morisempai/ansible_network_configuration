---
# FRR is a routing daemon and has no QoS model. QoS on a Linux/FRR host is
# kernel traffic control — `tc` qdisc/class/filter — owned by the host network
# stack (the linux_base role), not FRR. Explicit no-op keeps the dispatch
# contract intact — mirrors vlans/tasks/frr.yml and interfaces/tasks/frr.yml.
- name: "Qos_voip | frr | QoS is kernel tc, not FRR (no-op)"
  ansible.builtin.debug:
    msg: "QoS on FRR/Linux hosts is managed by linux_base (tc qdisc)."
