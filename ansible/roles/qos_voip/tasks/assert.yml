---
# Schema check for the qos_voip inputs. Runs after NetBox resolution.
- name: "Qos_voip | assert | inputs are well-formed"
  ansible.builtin.assert:
    quiet: true
    that:
      - qos_voip_vlan_id is integer
      - qos_voip_vlan_id >= 1
      - qos_voip_vlan_id <= 4094
      - (qos_voip_marking | string | lower) in _qos_voip_valid_dscp
    fail_msg: >-
      qos_voip_vlan_id must be an integer 1-4094 and qos_voip_marking a valid
      DSCP class (got vlan_id='{{ qos_voip_vlan_id }}',
      marking='{{ qos_voip_marking }}'). Valid markings: {{ _qos_voip_valid_dscp }}.
  vars:
    _qos_voip_valid_dscp:
      - default
      - be
      - ef
      - cs0
      - cs1
      - cs2
      - cs3
      - cs4
      - cs5
      - cs6
      - cs7
      - af11
      - af12
      - af13
      - af21
      - af22
      - af23
      - af31
      - af32
      - af33
      - af41
      - af42
      - af43
