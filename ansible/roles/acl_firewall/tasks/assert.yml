---
# Schema check for the acl_firewall inputs. This pins the vendor-agnostic
# interface: every tasks/<vendor>.yml file can assume a valid default action
# and well-formed rules — a valid CIDR src/dst and a parseable service. Runs
# after NetBox resolution so it validates whatever actually feeds the device
# task.

# acl_firewall_default_action is a templated scalar default, so it always
# renders as a string here — a plain membership test is sufficient.
- name: "Acl_firewall | assert | default action is allow or deny"
  ansible.builtin.assert:
    quiet: true
    that:
      - acl_firewall_default_action is defined
      - (acl_firewall_default_action | string) in ['allow', 'deny']
    fail_msg: >-
      acl_firewall_default_action must be 'allow' or 'deny', got
      '{{ acl_firewall_default_action | default("<undefined>") }}'.
      The network policy is deny-by-default.

- name: "Acl_firewall | assert | rules is a list"
  ansible.builtin.assert:
    quiet: true
    that:
      - acl_firewall_rules is defined
      - acl_firewall_rules is sequence
      - acl_firewall_rules is not string
      - acl_firewall_rules is not mapping
    fail_msg: "acl_firewall_rules must be a list of rule objects."

# Per-rule schema. src/dst must be CIDR (a.b.c.d/p); service must be either a
# bare protocol (ip / icmp) or proto/port for tcp / udp.
- name: "Acl_firewall | assert | every rule is well-formed"
  ansible.builtin.assert:
    quiet: true
    that:
      - item.name is defined
      - item.name | string | length > 0
      - item.src is defined
      - (item.src | string) is match(_acl_cidr_re)
      - item.dst is defined
      - (item.dst | string) is match(_acl_cidr_re)
      - item.service is defined
      - (item.service | string | lower) is match(_acl_service_re)
      - item.action is defined
      - (item.action | string) in ['allow', 'deny']
    fail_msg: >-
      Invalid acl_firewall rule {{ item }} — each rule needs a non-empty
      `name`, a CIDR `src` and `dst` (a.b.c.d/prefix), a `service` of
      `tcp/<port>`, `udp/<port>`, `ip` or `icmp`, and an `action` of
      'allow' or 'deny'.
  loop: "{{ acl_firewall_rules }}"
  loop_control:
    label: "{{ item.name | default('?') }}"
  vars:
    # a.b.c.d/p — each octet 0-255, prefix 0-32. Range-checking the octets
    # in a regex keeps the assert dependency-free (netaddr is not installed,
    # so the ansible.utils.ipaddr filters are unavailable here).
    _acl_octet: '(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])'
    _acl_cidr_re: >-
      ^{{ _acl_octet }}(\.{{ _acl_octet }}){3}/(3[0-2]|[12]?[0-9])$
    # tcp/<1-65535>, udp/<1-65535>, or a bare 'ip' / 'icmp'.
    _acl_port: '([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])'
    _acl_service_re: '^((tcp|udp)/{{ _acl_port }}|ip|icmp)$'

- name: "Acl_firewall | assert | rule names are unique"
  ansible.builtin.assert:
    quiet: true
    that:
      - acl_firewall_rules | map(attribute='name') | list | length
        == acl_firewall_rules | map(attribute='name') | unique | list | length
    fail_msg: >-
      Duplicate rule name in acl_firewall_rules:
      {{ acl_firewall_rules | map(attribute='name') | list }}
