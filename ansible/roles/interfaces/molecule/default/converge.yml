---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Drives tasks/assert.yml (schema validation). On a plain Linux host with
    # no ansible_network_os the role validates the list, then resolves to a
    # no-op — there is no device path.
    interfaces_config:
      - name: ethernet-1/1
        description: example trunk
        enabled: true
        mtu: 9100
        mode: trunk
        trunk_vlans: [10, 20, 40]
  tasks:
    - name: "Apply the interfaces role"
      ansible.builtin.include_role:
        name: interfaces
