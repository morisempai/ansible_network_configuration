---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Drives tasks/assert.yml (schema validation). On a plain Linux host with
    # no ansible_network_os the role validates the list, then resolves to a
    # no-op — there is no device path. The entries below exercise every
    # optional field: trunk + LACP membership, access, and routed.
    interfaces_config:
      - name: ethernet-1/1
        description: server uplink (LACP member)
        enabled: true
        mtu: 9100
        mode: trunk
        trunk_vlans: [10, 20, 40]
        channel_group: 1
      - name: ethernet-1/10
        description: user access port
        mode: access
        access_vlan: 40
      - name: ethernet-1/49
        description: routed uplink
        mode: routed
  tasks:
    - name: "Apply the interfaces role"
      ansible.builtin.include_role:
        name: interfaces
