---
# FortiGate physical port attributes. A FortiGate has no switch-style
# access/trunk model — VLANs are tagged sub-interfaces created by the vlans
# role (router-on-a-stick, docs/architecture-brief.md). This role configures
# the physical port's description, admin status and MTU only.
- name: "Interfaces | fortios | configure physical interfaces"
  fortinet.fortios.fortios_system_interface:
    vdom: "{{ fortios_vdom | default('root') }}"
    state: present
    system_interface:
      name: "{{ item.name }}"
      description: "{{ item.description | default('') }}"
      status: "{{ 'up' if item.enabled | default(true) else 'down' }}"
      mtu_override: "{{ 'enable' if item.mtu is defined else 'disable' }}"
      mtu: "{{ item.mtu | default(omit) }}"
  loop: "{{ interfaces_config }}"
  loop_control:
    label: "{{ item.name }}"
