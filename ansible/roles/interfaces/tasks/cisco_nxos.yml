---
# The MDS 9132T runs NX-OS but is a Fibre Channel SAN switch, physically
# isolated from the LAN (docs/architecture-brief.md). Its ports are FC
# interfaces, not L2 Ethernet, so this role's model — description, admin
# state, MTU, access/trunk mode, LACP — does not apply. Explicit no-op keeps
# the dispatch contract intact (see roles/common/tasks/main.yml).
- name: "Interfaces | cisco_nxos | FC SAN switch has no Ethernet interfaces (no-op)"
  ansible.builtin.debug:
    msg: "MDS 9132T is Fibre Channel only; Ethernet interface config does not apply."
