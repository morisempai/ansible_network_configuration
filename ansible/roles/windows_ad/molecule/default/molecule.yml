---
# Molecule scenario for the 'windows_ad' role.
#
# Windows roles cannot run in a Linux container. This scenario uses the
# 'delegated' driver and is intended to run against a Windows test host
# (a windows-latest GitHub runner, or a local Windows VM / Vagrant box)
# whose connection details are supplied via the MOLECULE_WINDOWS_HOST
# environment variable.
#
# It is intentionally EXCLUDED from the default PR Molecule matrix
# (.github/workflows/molecule.yml) — see that file's matrix definition.
dependency:
  name: galaxy
driver:
  name: delegated
platforms:
  - name: ansnet-windows-ad
    groups:
      - windows
provisioner:
  name: ansible
  inventory:
    hosts:
      ansnet-windows-ad:
        ansible_host: "${MOLECULE_WINDOWS_HOST:-127.0.0.1}"
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
verifier:
  name: ansible
