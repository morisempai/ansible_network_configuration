---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: "Windows_ad | AD-Domain-Services feature is installed"
      ansible.windows.win_feature:
        name: AD-Domain-Services
        state: present
      check_mode: true
      register: windows_ad_feature_check
      failed_when: windows_ad_feature_check is changed
