---
# Resolve role inputs from NetBox (the source of truth) before applying
# the role - skipped unless netbox_enabled is set. See docs/netbox.md.
- name: "Windows_ad | resolve inputs from NetBox"
  ansible.builtin.include_tasks: netbox.yml
  when: netbox_enabled | default(false) | bool

# Fail fast on malformed inputs before any device is touched.
- name: "Windows_ad | validate role inputs"
  ansible.builtin.include_tasks: assert.yml

# Windows-only role: no vendor dispatch needed. windows.yml is included
# directly; the file name keeps parity with the dispatcher convention used by
# the network roles. See docs/adding-a-role.md.
- name: "Windows_ad | apply Windows AD configuration"
  ansible.builtin.include_tasks: windows.yml
