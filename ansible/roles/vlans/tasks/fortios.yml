---
# A FortiGate has no switch-style VLAN database. On the regional
# router-on-a-stick (docs/architecture-brief.md) each VLAN is a tagged
# sub-interface of the LAN port — this declares that sub-interface. IP
# addressing and gateways are the l3_routing role's responsibility.
- name: "Vlans | fortios | tagged VLAN sub-interface per VLAN"
  fortinet.fortios.fortios_system_interface:
    vdom: "{{ fortios_vdom | default('root') }}"
    state: present
    system_interface:
      name: "vlan{{ item.id }}"
      vlanid: "{{ item.id }}"
      type: vlan
      interface: "{{ fortios_vlan_parent | default('lan') }}"
      description: "{{ item.name }}"
  loop: "{{ vlans_config }}"
  loop_control:
    label: "vlan{{ item.id }}"
