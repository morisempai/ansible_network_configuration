---
# The MDS 9132T runs NX-OS but is a Fibre Channel SAN switch with no
# Ethernet VLAN database (docs/architecture-brief.md — the FC fabric is
# physically isolated). Explicit no-op keeps the dispatch contract intact.
- name: "Vlans | cisco_nxos | no Ethernet VLANs on the FC SAN switch (no-op)"
  ansible.builtin.debug:
    msg: "MDS 9132T is Fibre Channel only; Ethernet VLANs do not apply."
