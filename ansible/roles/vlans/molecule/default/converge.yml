---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Drives tasks/assert.yml (schema validation) and the dispatcher. On a
    # plain Linux host with no ansible_network_os the role validates the
    # database, then correctly resolves to a no-op — there is no device path.
    vlans:
      - id: 10
        name: management
      - id: 20
        name: servers
  tasks:
    - name: "Apply the vlans role"
      ansible.builtin.include_role:
        name: vlans
