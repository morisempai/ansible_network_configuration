---
# NetBox source of truth for the backup_config role.
#
# Included by tasks/main.yml when netbox_enabled is true. backup_config is an
# output role with no device config to source from NetBox, but its behaviour
# — destination directory and whether to publish to git — can be centrally
# overridden from the device's config context. backup_config_timestamp is run
# metadata, not device data, so it is never sourced from NetBox.
#
# backup_config_git_push comes back through a folded `>-` scalar here, so it
# may render as a string; tasks/assert.yml accepts that and normalises it back
# to a real boolean. See docs/netbox.md and memory/ansible_templating_gotcha.
- name: "Backup_config | netbox | resolve backup settings from config context"
  ansible.builtin.set_fact:
    backup_config_dir: "{{ config_context.backup_config_dir | default(backup_config_dir) }}"
    backup_config_git_push: >-
      {{ config_context.backup_config_git_push | default(backup_config_git_push) }}
  when: config_context is defined
