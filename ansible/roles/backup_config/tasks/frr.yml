---
# FRRouting exposes a Cisco-style CLI over network_cli. cli_command runs
# `show running-config` — a pure read — so it is safe under --check and the
# backup still happens in a dry run.
- name: "Backup_config | frr | fetch running-config"
  ansible.netcommon.cli_command:
    command: show running-config
  register: backup_config_frr_running
  check_mode: false

- name: "Backup_config | frr | write running-config to the backup tree"
  ansible.builtin.copy:
    dest: >-
      {{ backup_config_dir }}/{{ inventory_hostname }}/{{ inventory_hostname }}-{{ backup_config_timestamp }}.cfg
    content: "{{ backup_config_frr_running.stdout }}\n"
    mode: "0640"
  delegate_to: localhost
