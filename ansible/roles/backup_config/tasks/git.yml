---
# Publish the backup tree to its git repository.
#
# Included by tasks/main.yml (run_once) only when backup_config_git_push is
# true. backup_config_dir is expected to already be a git working tree — the
# dedicated backup repository, cloned out-of-band (by AWX, the bootstrap, or
# an operator). This file does not create or clone the repository; it stages,
# commits and pushes whatever the vendor tasks just wrote.
#
# Everything runs on the control node, where the files live, hence
# delegate_to: localhost throughout. ansible.builtin.git manages *checkouts*,
# not commits, so commit/push are ansible.builtin.command steps — the
# command-instead-of-module noqa tags below are deliberate: no module covers
# `git add` / `git commit` / `git push`.
#
# In --check mode the read-only vendor tasks write nothing, so there is
# nothing to stage; the commit/push steps are guarded by check_mode and by
# the staged-changes probe, leaving the working tree untouched in a dry run.

- name: "Backup_config | git | confirm the backup directory is a git work tree"
  ansible.builtin.command:
    cmd: git rev-parse --is-inside-work-tree
    chdir: "{{ backup_config_dir }}"
  delegate_to: localhost
  changed_when: false
  check_mode: false
  register: backup_config_git_worktree
  failed_when: backup_config_git_worktree.stdout | trim != 'true'

- name: "Backup_config | git | stage the backup files"  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git add -A
    chdir: "{{ backup_config_dir }}"
  delegate_to: localhost
  changed_when: false
  check_mode: false

# `git diff --cached --quiet` exits 0 when the index is clean and 1 when
# something is staged — use that as the changed signal and the commit gate.
- name: "Backup_config | git | check whether anything was staged"  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git diff --cached --quiet
    chdir: "{{ backup_config_dir }}"
  delegate_to: localhost
  register: backup_config_git_staged
  changed_when: backup_config_git_staged.rc == 1
  failed_when: backup_config_git_staged.rc not in [0, 1]
  check_mode: false

# Commit and push in one task so there is no when:-is-changed handler split.
# The task is skipped outright when the index is clean, so an unchanged run
# is a genuine no-op. check_mode false would still write, so the task is
# guarded by check_mode below — a dry run reports the intent without pushing.
- name: "Backup_config | git | commit and push the new backups"  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: >-
      git -c user.name='ansible-backup-config'
          -c user.email='noreply@examplecorp.internal'
          commit -m 'backup: configs {{ backup_config_timestamp }}'
    chdir: "{{ backup_config_dir }}"
  delegate_to: localhost
  changed_when: true
  when:
    - backup_config_git_staged.rc == 1
    - not ansible_check_mode

- name: "Backup_config | git | push to the remote backup repository"  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git push
    chdir: "{{ backup_config_dir }}"
  delegate_to: localhost
  changed_when: true
  when:
    - backup_config_git_staged.rc == 1
    - not ansible_check_mode
