---
# Layer-3 configuration for the HQ Cisco core (C9300 stack). The core does
# inter-VLAN routing through SVIs, plus static routes and — for the WAN /
# inter-site fabric — OSPF (docs/architecture-brief.md).
#
# ios_l3_interfaces, ios_static_routes and ios_ospfv2 are resource modules:
# each takes the FULL desired list in a single call, so this file builds
# the complete config structure and applies it once per concern rather
# than looping per item. state: merged adds and updates the listed objects
# without pruning anything else.

# An SVI is created the moment it carries an IP, so ios_l3_interfaces alone
# brings the Vlan<id> interface into existence with its address.
- name: "L3_routing | cisco_ios | SVI IP addressing"
  cisco.ios.ios_l3_interfaces:
    config: >-
      {{ l3_routing_svis
         | json_query('[].{name: join(``, [`Vlan`, to_string(vlan_id)]),
                            ipv4: [{address: address}]}') }}
    state: merged
  when: l3_routing_svis | length > 0

# ios_l3_interfaces has no description field, so the SVI description is set
# separately through ios_interfaces. Only SVIs that declare one are passed.
- name: "L3_routing | cisco_ios | SVI descriptions"
  cisco.ios.ios_interfaces:
    config: >-
      {{ l3_routing_svis
         | selectattr('description', 'defined')
         | json_query('[].{name: join(``, [`Vlan`, to_string(vlan_id)]),
                            description: description}') }}
    state: merged
  when:
    - l3_routing_svis | selectattr('description', 'defined') | list | length > 0

# Static routes — the whole IPv4 routing table in one resource-module call.
- name: "L3_routing | cisco_ios | static routes"
  cisco.ios.ios_static_routes:
    config:
      - address_families:
          - afi: ipv4
            routes: >-
              {{ l3_routing_static
                 | json_query('[].{dest: prefix,
                                    next_hops: [{forward_router_address:
                                                 next_hop}]}') }}
    state: merged
  when: l3_routing_static | length > 0

# OSPF — one process advertising the configured networks. ios_ospfv2 wants
# each network as a plain `address` + `wildcard_bits` pair, never a CIDR, so
# the area prefixes are split here with a CIDR-length -> wildcard-mask table
# (the inverse of the netmask table tasks/fortios.yml uses). Skipped
# entirely when l3_routing_ospf is the empty default.
- name: "L3_routing | cisco_ios | build the OSPF network list"
  ansible.builtin.set_fact:
    _l3_routing_ios_ospf_networks: >-
      {{ _l3_routing_ios_ospf_networks | default([]) + [{
           'address': item.network | split('/') | first,
           'wildcard_bits':
             _l3_routing_ios_wildcard[item.network | split('/') | last],
           'area': item.area | string,
         }] }}
  loop: "{{ l3_routing_ospf.areas | default([]) }}"
  loop_control:
    label: "{{ item.network }}"
  vars:
    # CIDR prefix-length -> wildcard mask (the inverse of the subnet mask).
    # Covers every length the VLAN scheme in docs/architecture-brief.md
    # uses; a prefix length outside this table needs a new entry.
    _l3_routing_ios_wildcard:
      "8": "0.255.255.255"
      "16": "0.0.255.255"
      "22": "0.0.3.255"
      "23": "0.0.1.255"
      "24": "0.0.0.255"
      "25": "0.0.0.127"
      "30": "0.0.0.3"
      "32": "0.0.0.0"
  when: l3_routing_ospf | length > 0

- name: "L3_routing | cisco_ios | OSPF process and networks"
  cisco.ios.ios_ospfv2:
    config:
      processes:
        - process_id: "{{ l3_routing_ospf.process_id | default(1) | int }}"
          network: "{{ _l3_routing_ios_ospf_networks | default([]) }}"
    state: merged
  when: l3_routing_ospf | length > 0
