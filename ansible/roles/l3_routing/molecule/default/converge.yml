---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    # Drives tasks/assert.yml (schema validation) and the dispatcher. On a
    # plain Linux host with no ansible_network_os the role validates the
    # inputs, then resolves to a no-op — there is no device path. The
    # values below exercise every input: an SVI with a description, two
    # static routes (one with an explicit FortiGate egress device), and an
    # OSPF profile with two areas.
    l3_routing_svis:
      - vlan_id: 40
        address: 10.0.40.1/22
        description: corp users gateway
    l3_routing_static:
      - prefix: 0.0.0.0/0
        next_hop: 10.0.90.1
        device: wan1
      - prefix: 10.0.50.0/24
        next_hop: 10.0.90.2
    l3_routing_ospf:
      process_id: 1
      areas:
        - network: 10.0.40.0/22
          area: 0
        - network: 10.0.90.0/30
          area: 0
  tasks:
    - name: "Apply the l3_routing role"
      ansible.builtin.include_role:
        name: l3_routing
