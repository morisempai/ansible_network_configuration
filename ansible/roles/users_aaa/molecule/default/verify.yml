---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    # On the plain Debian test host the role resolves to linux.yml, which
    # really creates the break-glass accounts from converge.yml. Verify the
    # resulting state directly rather than just asserting the play ran.
    - name: "Users_aaa | look up the break-glass accounts in passwd"
      ansible.builtin.getent:
        database: passwd
        key: "{{ item }}"
      loop:
        - netadmin
        - netviewer

    - name: "Users_aaa | read the sudo group membership"
      ansible.builtin.getent:
        database: group
        key: sudo

    - name: "Users_aaa | accounts exist and the admin is in sudo"
      ansible.builtin.assert:
        that:
          - "'netadmin' in getent_passwd"
          - "'netviewer' in getent_passwd"
          - getent_passwd['netadmin'][5] == '/bin/bash'
          - "'netadmin' in getent_group['sudo'][2].split(',')"
          - "'netviewer' not in getent_group['sudo'][2].split(',')"
        success_msg: "'users_aaa' created the break-glass accounts as expected."
        fail_msg: "'users_aaa' did not produce the expected local accounts."
