---
# Schema check for the users_aaa inputs. This pins the vendor-agnostic
# interface: every tasks/<vendor>.yml file can assume each RADIUS server has
# a non-empty `host` and `secret`, each local account a non-empty `name` and
# `role`, and that users_aaa_dot1x is a mapping with a boolean `enabled`.
# Runs after NetBox resolution so it validates whatever actually feeds the
# device task. Templated scalar defaults can render as strings, so type
# checks coerce before testing (see the ansible templating gotcha).

- name: "Users_aaa | assert | users_aaa_servers is a list"
  ansible.builtin.assert:
    quiet: true
    that:
      - users_aaa_servers is sequence
      - users_aaa_servers is not string
    fail_msg: >-
      users_aaa_servers must be a list of RADIUS servers, got
      {{ users_aaa_servers | type_debug }}.

# Validates host/secret so every per-vendor file can rely on item.host and
# item.secret. no_log because each entry carries a RADIUS secret.
- name: "Users_aaa | assert | every RADIUS server has a host and a secret"
  ansible.builtin.assert:
    quiet: true
    that:
      - item.host is defined
      - item.host | string | length > 0
      - item.secret is defined
      - item.secret | string | length > 0
      - (item.timeout is not defined) or (item.timeout | int > 0)
    fail_msg: >-
      Invalid users_aaa_servers entry — each RADIUS server needs a non-empty
      `host` and `secret`; `timeout`, when present, must be a positive
      integer. (Entry redacted: it carries a secret.)
  loop: "{{ users_aaa_servers }}"
  loop_control:
    label: "{{ item.host | default('?') }}"
  no_log: true

- name: "Users_aaa | assert | RADIUS server hosts are unique"
  ansible.builtin.assert:
    quiet: true
    that:
      - users_aaa_servers | map(attribute='host') | list | length
        == users_aaa_servers | map(attribute='host') | unique | list | length
    fail_msg: >-
      Duplicate RADIUS server host in users_aaa_servers:
      {{ users_aaa_servers | map(attribute='host') | list }}

- name: "Users_aaa | assert | users_aaa_dot1x is a mapping with a boolean enabled"
  ansible.builtin.assert:
    quiet: true
    that:
      - users_aaa_dot1x is mapping
      - users_aaa_dot1x.enabled is defined
      - users_aaa_dot1x.enabled is boolean
    fail_msg: >-
      users_aaa_dot1x must be a mapping with a boolean `enabled` key, got
      {{ users_aaa_dot1x | type_debug }}.

- name: "Users_aaa | assert | every local account is well-formed"
  ansible.builtin.assert:
    quiet: true
    that:
      - item.name is defined
      - item.name | string | length > 0
      - item.role is defined
      - item.role | string | length > 0
    fail_msg: >-
      Invalid users_aaa_local entry {{ item }} — each account needs a
      non-empty `name` and `role`.
  loop: "{{ users_aaa_local }}"
  loop_control:
    label: "{{ item.name | default('?') }}"

- name: "Users_aaa | assert | local account names are unique"
  ansible.builtin.assert:
    quiet: true
    that:
      - users_aaa_local | map(attribute='name') | list | length
        == users_aaa_local | map(attribute='name') | unique | list | length
    fail_msg: >-
      Duplicate account name in users_aaa_local:
      {{ users_aaa_local | map(attribute='name') | list }}
