---
# Molecule scenario for the 'common' role.
#
# 'common' has a full Linux implementation (tasks/linux.yml), so this
# scenario genuinely converges and verifies real device state on a Debian
# test container. The Cisco IOS / FortiGate / SR Linux paths are exercised
# against the Containerlab lab — see docs/lab.md.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ansnet-common-debian
    image: geerlingguy/docker-debian12-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
provisioner:
  name: ansible
  # The role under test lives in ansible/roles/<name>, not at the repo
  # root, so put the roles directory on Ansible's role search path.
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    group_vars:
      all:
        org_domain: lab.example.internal
        ntp_servers: [10.0.10.10, 10.0.10.11]
        dns_servers: [10.0.10.20, 10.0.10.21]
        syslog_servers:
          - host: 10.0.10.30
            port: 514
            proto: udp
verifier:
  name: ansible
