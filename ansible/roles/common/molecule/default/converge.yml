---
- name: Converge
  hosts: all
  gather_facts: true
  pre_tasks:
    # The role installs chrony itself but only *configures* rsyslog
    # forwarding, assuming rsyslog is already the syslog daemon. Refresh the
    # apt cache and pre-install rsyslog so the test host matches that contract.
    # cache_valid_time keeps the idempotence pass from re-updating the cache.
    - name: "Refresh apt cache and ensure rsyslog is installed"
      ansible.builtin.apt:
        name: rsyslog
        state: present
        update_cache: true
        cache_valid_time: 3600
  tasks:
    - name: "Apply the common role"
      ansible.builtin.include_role:
        name: common
