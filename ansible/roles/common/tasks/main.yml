---
# Resolve role inputs from NetBox (the source of truth) before applying
# the role — skipped unless netbox_enabled is set. See docs/netbox.md.
- name: "Common | resolve inputs from NetBox"
  ansible.builtin.include_tasks: netbox.yml
  when: netbox_enabled | default(false) | bool

# Fail fast on malformed inputs before any device is touched.
- name: "Common | validate role inputs"
  ansible.builtin.include_tasks: assert.yml

# Dispatcher. Maps ansible_network_os -> per-vendor task file, falling back to
# ansible_os_family for non-network hosts, then to linux.yml as a last resort.
# 'select' drops the empty candidate when ansible_network_os is unknown —
# otherwise first_found matches the tasks/ directory itself. Missing
# implementations are silently skipped (errors='ignore'), so a role that does
# not target every vendor still lints and runs. On ansible-core >= 2.18
# first_found returns None rather than '' when nothing matches, so
# default('', true) normalises it and keeps the 'when' guard below safe.

- name: "Common | include vendor task file"
  ansible.builtin.include_tasks: "{{ _vendor_task_file }}"
  vars:
    _vendor_map:
      cisco.ios.ios: cisco_ios.yml
      cisco.nxos.nxos: cisco_nxos.yml
      nokia.srlinux.srlinux: srlinux.yml
      frr.frr.frr: frr.yml
      fortinet.fortios.fortios: fortios.yml
    _candidates:
      - "{{ _vendor_map[ansible_network_os | default('none')] | default('') }}"
      - "{{ ansible_os_family | default('') | lower }}.yml"
      - "linux.yml"
    _vendor_task_file: >-
      {{ lookup('ansible.builtin.first_found',
                _candidates | select | list, errors='ignore',
                paths=[role_path + '/tasks']) | default('', true) }}
  when: _vendor_task_file | length > 0
