---
name: molecule

on:
  pull_request:

jobs:
  molecule:
    name: "molecule: ${{ matrix.role }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # windows_ad is intentionally excluded — it needs a Windows host.
        # See ansible/roles/windows_ad/molecule/default/molecule.yml and the
        # 'molecule-windows' job below.
        role:
          - common
          - users_aaa
          - interfaces
          - vlans
          - l3_routing
          - acl_firewall
          - qos_voip
          - linux_base
          - backup_config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r ansible/requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: molecule test
        working-directory: ansible/roles/${{ matrix.role }}
        run: molecule test

  molecule-windows:
    name: "molecule: windows_ad"
    # Runs on Linux on purpose: ansible-core requires a UTF-8 locale and does
    # not support a Windows control node, so ansible-galaxy / ansible-lint
    # cannot run on a windows-latest runner. A real `molecule test` for
    # windows_ad needs a reachable Windows *managed* node (delegated driver —
    # see the role's molecule.yml); until a self-hosted AD test box is wired
    # up, this job lints the role only.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ansible
        run: pip install ansible-core ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Lint the windows_ad role
        run: ansible-lint -c .ansible-lint ansible/roles/windows_ad
