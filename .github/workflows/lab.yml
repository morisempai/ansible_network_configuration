---
name: lab-integration

# Heavy job: boots the Containerlab topology and runs site.yml against it.
# Not part of the default PR pipeline — trigger it manually when a change
# warrants end-to-end validation.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply changes (true) or run in --check mode (false)"
        required: false
        default: "false"

jobs:
  lab:
    name: Containerlab integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r ansible/requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Deploy the lab
        run: ./lab/deploy.sh up

      - name: Run site.yml against the lab
        working-directory: ansible
        run: |
          CHECK_FLAG="--check"
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            CHECK_FLAG=""
          fi
          ansible-playbook -i inventory/lab/hosts.yml \
            playbooks/site.yml ${CHECK_FLAG} --diff

      - name: Destroy the lab
        if: always()
        run: ./lab/deploy.sh down
